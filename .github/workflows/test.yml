name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  bun_unit_tests:
    name: bun unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: |
          bun install --no-save
          bun test

  kdts_fast_unit_tests:
    name: kdts fast unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: |
          bun install --no-save
          bunx kdts test --fast

  kdts_unit_tests:
    name: kdts unit tests, ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: container
            cmd: kdts test container --strict
          - name: crosschain
            cmd: kdts test crosschain --strict
          - name: crypto
            cmd: kdts test crypto --strict
          - name: did
            cmd: kdts test did --strict
          - name: ethereum
            cmd: kdts test ethereum/test --strict
          - name: mina
            cmd: kdts test mina --strict
          - name: protocol
            cmd: kdts test protocol
          - name: util
            cmd: kdts test util --strict
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: |
          bun install --no-save
          bunx ${{ matrix.cmd }}
