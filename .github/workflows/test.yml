name: All tests

on:
  push:
    branches: ["ana", "prod"]
  pull_request:
    branches: ["ana", "prod"]

jobs:
  check_bun_tests:
    name: Unit tests with bun
    strategy:
      fail-fast: true

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: oven-sh/setup-bun@v1
      - name: Run bun tests
        run: |
          bun i
          bun test --timeout 15000
        id: test

  check_compiled_bun:
    name: Compiled tests with bun
    strategy:
      fail-fast: true

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: oven-sh/setup-bun@v1
      - name: "`kdjs` compiled tests with bun"
        run: |
          bun i
          bun run.js test

  compile_kdjs_with_kdjs:
    name: Compile `kdjs` with `kdjs`
    strategy:
      fail-fast: true

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: oven-sh/setup-bun@v1
      - name: "Compile `kdjs` with `kdjs`"
        run: |
          cd kdjs
          bun i
          bun kdjs.js kdjs.js
