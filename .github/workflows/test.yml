name: Test

on:
  push:
    branches: ["ana", "prod"]
  pull_request:
    branches: ["ana", "prod"]

jobs:
  bun_unit_tests:
    name: bun unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: |
          bun i
          bun test

  kdts_fast_unit_tests:
    name: kdts fast unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: |
          bun i
          bun run test --fast

  kdts_unit_tests_crosschain:
    name: kdts unit tests, crosschain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - run: |
          bun i
          bun run test crosschain --strict

  kdts_unit_tests_crypto:
    name: kdts unit tests, crypto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - run: |
          bun i
          bun run test crypto --strict

  kdts_unit_tests_did:
    name: kdts unit tests, did
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - run: |
          bun i
          bun run test did --strict

  kdts_unit_tests_ethereum:
    name: kdts unit tests, ethereum
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - run: |
          bun i
          bun run test ethereum

  kdts_unit_tests_kastro:
    name: kdts unit tests, kastro
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - run: |
          bun i
          bun run test kastro

  kdts_unit_tests_kdts:
    name: kdts unit tests, kdts
    runs-on: ubuntu-latest
    if: false # Temporarily disabled
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - run: |
          bun i
          bun run test kdts

  kdts_unit_tests_mina:
    name: kdts unit tests, mina
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - run: |
          bun i
          bun run test mina --strict

  kdts_unit_tests_protocol:
    name: kdts unit tests, protocol
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - run: |
          bun i
          bun run test protocol

  kdts_unit_tests_util:
    name: kdts unit tests, util
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - run: |
          bun i
          bun run test util --strict

  compile_kdts_with_kdts:
    name: Compile `kdts` with `kdts`
    runs-on: ubuntu-latest
    if: false # Temporarily disabled
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - run: |
          bun i
          bun kdts/kdts.js kdts/kdts.js
