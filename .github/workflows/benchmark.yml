name: Bench

on:
  push:
    branches: ["ana", "main"]
  pull_request:
    branches: ["ana", "main"]

jobs:
  benchmark:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: crypto benches
            cmd: kdts bench crypto --strict
          - name: util benches
            cmd: kdts bench util --strict
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: |
          bun install --no-save
          bunx ${{ matrix.cmd }}
