name: Bench

on:
  push:
    branches: ["ana", "main"]
  pull_request:
    branches: ["ana", "main"]

jobs:
  benchmark_crypto:
    name: crypto benches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Run crypto benchmarks
        run: |
          bun i
          bun bench crypto --strict
  benchmark_util:
    name: util benches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Run util benchmarks
        run: |
          bun i
          bun bench util --strict
